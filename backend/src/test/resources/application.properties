# Tests run against an in-memory H2 database (MySQL compatibility mode) so the
# suite is self-contained and does not require the docker MySQL to be running.
spring.application.name=skribbl-test
spring.datasource.url=jdbc:h2:mem:skribbl;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
app.cors.allowed-origins=http://localhost:5173
