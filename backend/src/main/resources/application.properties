spring.application.name=skribbl

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skribbl}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:skribbl}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:skribbl123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

logging.level.com.skribbl=INFO