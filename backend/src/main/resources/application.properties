spring.application.name=skribbl

# --- Datasource (MySQL). All overridable via environment variables. ---
# Local default points at the docker-compose MySQL mapped to host port 3307.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/skribbl?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:skribbl}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:skribbl123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.jpa.show-sql=true

# --- Server ---
server.port=8080

# --- CORS / SockJS allowed origins (comma-separated patterns; "*" = any) ---
# "*" keeps local dev simple, including access from another device over the LAN.
# Lock this down to the real frontend origin(s) before deploying.
app.cors.allowed-origins=*

logging.level.com.skribbl=INFO
